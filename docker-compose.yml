services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: ${DB_PASSWORD:-collector_pass}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collector -d realestate"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://collector:${DB_PASSWORD:-collector_pass}@postgres:5432/realestate
      DATA_GO_KR_API_KEY: ${DATA_GO_KR_API_KEY:-}
      VWORLD_API_KEY: ${VWORLD_API_KEY:-}
      REB_API_KEY: ${REB_API_KEY:-}
      SEOUL_API_KEY: ${SEOUL_API_KEY:-}
      GYEONGGI_API_KEY: ${GYEONGGI_API_KEY:-}
      PRIVATE_CRAWLER_DELAY: ${PRIVATE_CRAWLER_DELAY:-2}
      COLLECTION_INTERVAL_MINUTES: ${COLLECTION_INTERVAL_MINUTES:-30}
      ADMIN_PORT: ${ADMIN_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:
