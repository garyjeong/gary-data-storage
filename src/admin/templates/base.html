<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Real Estate Admin{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --success: #22c55e;
      --warning: #f59e0b;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Nav ── */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
      box-shadow: var(--shadow);
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 16px;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar-brand span { font-size: 20px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      text-decoration: none;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: var(--radius);
      font-weight: 500;
      transition: background .15s, color .15s;
    }
    .nav-link:hover { background: var(--bg); color: var(--text); }
    .nav-link.active { background: #eff6ff; color: var(--primary); }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title { font-size: 20px; font-weight: 700; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .card-value { font-size: 28px; font-weight: 700; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-title { font-weight: 600; font-size: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--bg);
      text-align: left;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-red   { background: #fee2e2; color: #991b1b; }
    .badge-yellow{ background: #fef9c3; color: #854d0e; }
    .badge-blue  { background: #dbeafe; color: #1d4ed8; }
    .badge-gray  { background: #f1f5f9; color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s, opacity .15s;
      text-decoration: none;
    }
    .btn:hover { filter: brightness(.93); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn-ghost    { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-sm       { padding: 4px 10px; font-size: 12px; }
    .btn-icon     { padding: 5px; }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #cbd5e1;
      border-radius: 9999px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--success); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      width: 440px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast-item {
      background: var(--text);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow);
      animation: slidein .2s ease;
    }
    .toast-item.error { background: var(--danger); }
    .toast-item.success { background: #166534; }
    @keyframes slidein {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Misc ── */
    .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .empty-row td { text-align: center; color: var(--muted); padding: 32px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">
      <span>&#127968;</span> RE Admin
    </a>
    <div class="nav-links">
      <a href="/"         class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a>
      <a href="/regions"  class="nav-link {% block nav_regions  %}{% endblock %}">Regions</a>
      <a href="/schedules"class="nav-link {% block nav_schedules %}{% endblock %}">Schedules</a>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <div id="toast"></div>

  <script>
    function showToast(msg, type = "") {
      const el = document.createElement("div");
      el.className = "toast-item" + (type ? " " + type : "");
      el.textContent = msg;
      document.getElementById("toast").appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
      return data;
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
